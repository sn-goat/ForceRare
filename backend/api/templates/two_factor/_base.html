<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}ForceRare Control Panel{% endblock %}</title>
<style>
    body {
        font-family: "Times New Roman", Times, serif;
        background: #f5f5f5;
        margin: 0;
        padding: 2rem;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .panel {
        background: white;
        padding: 2rem 3rem;
        border: 2px solid #999;
        box-shadow: 4px 4px 0 #ccc;
        width: 100%;
        max-width: 420px;
    }

    .panel-header {
        text-align: center;
        border-bottom: 2px solid #1a1a1a;
        margin-bottom: 1.5rem;
        padding-bottom: 1rem;
    }

    .panel-header h1 {
        font-size: 1.4rem;
        font-weight: bold;
        color: #1a1a1a;
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }

    .panel-header p {
        font-size: 0.85rem;
        color: #555;
        margin-top: 0.25rem;
    }

    {% block extra_css %}{% endblock %}
</style>
</head>
<body>
<div class="panel">
    <div class="panel-header">
        <h1>{% block panel_title %}ForceRare{% endblock %}</h1>
        <p>Control Panel</p>
    </div>
    {% block content %}{% endblock %}
</div>
</body>
</html>
