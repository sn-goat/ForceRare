<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Account Locked</title>
<style>
    body {
        font-family: "Times New Roman", Times, serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background: #f5f5f5;
    }

    .box {
        background: white;
        padding: 2rem 3rem;
        border: 2px solid #999;
        box-shadow: 4px 4px 0 #ccc;
        text-align: center;
    }

    h1 { color: #c0392b; font-weight: bold; text-transform: uppercase; letter-spacing: 0.05em; }
    p { color: #555; margin-top: 0.5rem; }
</style>
</head>
<body>
<div class="box">
<h1>Account Locked</h1>
<p>Too many failed login attempts.</p>
<p>Please try again in <strong>1 hour</strong>.</p>
</div>
</body>
</html>
