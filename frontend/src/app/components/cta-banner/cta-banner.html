<section class="cta-banner" id="faire-un-don">
  <div class="cta-banner__inner">
    <div class="cta-banner__content">
      <h2 class="cta-banner__heading">{{ cta.heading }}</h2>
      <p class="cta-banner__subtext">{{ cta.subtext }}</p>
    </div>
    <a class="cta-banner__btn" [href]="donateUrl" target="_blank" rel="noopener noreferrer">
      {{ cta.buttonLabel }}
    </a>
  </div>
</section>
