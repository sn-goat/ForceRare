<section class="partners section" id="partenaires">
  <div class="section__inner">
    <h2 class="section-heading">{{ heading }}</h2>
    <p class="section-subtext">{{ subtext }}</p>

    <div class="partners__grid">
      @for (partner of partners; track partner.name) {
        <a
          class="partners__card"
          [href]="partner.websiteUrl"
          target="_blank"
          rel="noopener noreferrer"
        >
          <h3 class="partners__name">{{ partner.name }}</h3>
          <p class="partners__desc">{{ partner.shortDescription }}</p>
          <span class="partners__link">{{ partner.websiteLabel }} →</span>
        </a>
      }
    </div>

    <div style="text-align: center; margin-top: 2.5rem;">
      <a class="btn-primary" routerLink="/nos-partenaires">{{ cta }}</a>
    </div>
  </div>
</section>
