<footer class="footer">
  <div class="footer__inner">
    <!-- Column 1: Brand -->
    <div class="footer__brand">
      <span class="footer__logo">FORCE RARE</span>
      <p class="footer__tagline">{{ footer.tagline }}</p>
    </div>

    <!-- Column 2: Quick links -->
    <div class="footer__col">
      <h4 class="footer__col-title">{{ footer.navTitle }}</h4>
      <ul class="footer__nav">
        @for (link of navLinks; track link.route) {
          <li><a [routerLink]="link.route">{{ link.label }}</a></li>
        }
      </ul>
    </div>

    <!-- Column 3: Social -->
    <div class="footer__col">
      <h4 class="footer__col-title">{{ footer.socialTitle }}</h4>
      <div class="footer__social">
        @for (link of footer.socialLinks; track link.label) {
          <a
            class="footer__social-link"
            [href]="link.url"
            target="_blank"
            rel="noopener noreferrer"
            [attr.aria-label]="link.label"
          >
            {{ link.label }}
          </a>
        }
      </div>
    </div>
  </div>

  <!-- Bottom bar -->
  <div class="footer__bottom">
    <p class="footer__copy">{{ footer.copyright }}</p>
  </div>
</footer>
